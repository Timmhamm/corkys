<div class="contact-page">
  <section class="contact-hero section">
    <div class="container">
      <h1>Contact Us</h1>
      <p class="subtitle">We'd love to hear from you! Get in touch with us today.</p>
    </div>
  </section>

  <section class="contact-content section">
    <div class="container">
      <div class="contact-grid">
        <div class="contact-info">
          <h2>Visit Us</h2>
          <div class="info-card">
            <h3>Address</h3>
            <p>729 Justus Blvd.<br>Scott Twp, PA 18411</p>
          </div>

          <div class="info-card">
            <h3>Phone</h3>
            <p><a href="tel:570-586-9563">570-586-9563</a></p>
          </div>

          <div class="info-card">
            <h3>Store Hours</h3>
            <p>
              <strong>Mon - Sat:</strong> 10am – 6pm<br>
              <strong>Sun:</strong> 12pm – 5pm
            </p>
          </div>
        </div>

        <div class="contact-form-wrapper">
          <h2>Send Us a Message</h2>
          <form class="contact-form" (ngSubmit)="onSubmit($event)">
            <div class="form-group">
              <label for="name">Name *</label>
              <input 
                type="text" 
                id="name" 
                name="name" 
                [(ngModel)]="formData.name"
                required
              >
            </div>

            <div class="form-group">
              <label for="email">Email *</label>
              <input 
                type="email" 
                id="email" 
                name="email" 
                [(ngModel)]="formData.email"
                required
              >
            </div>

            <div class="form-group">
              <label for="phone">Phone</label>
              <input 
                type="tel" 
                id="phone" 
                name="phone" 
                [(ngModel)]="formData.phone"
              >
            </div>

            <div class="form-group">
              <label for="message">Message *</label>
              <textarea 
                id="message" 
                name="message" 
                rows="5"
                [(ngModel)]="formData.message"
                required
              ></textarea>
            </div>

            <button type="submit" class="btn-primary">Send Message</button>
          </form>
        </div>
      </div>
    </div>
  </section>
</div>
