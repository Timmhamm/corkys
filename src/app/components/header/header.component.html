<header class="header">
  <div class="header-container">
    <div class="logo">
      <a routerLink="/">
        <img src="assets/logo.png" alt="Corky's Garden Path" class="logo-image" *ngIf="logoExists">
        <h1 *ngIf="!logoExists">Corky's Garden Path</h1>
      </a>
    </div>
    
    <nav class="nav-menu" [class.active]="isMenuOpen">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Home</a>
      <div class="dropdown">
        <a routerLink="/resources" routerLinkActive="active" class="dropdown-toggle">Resources</a>
        <div class="dropdown-menu">
          <a routerLink="/resources/news">News</a>
          <a routerLink="/resources/careers">Careers</a>
          <a routerLink="/resources/donations">Donations</a>
          <a routerLink="/events">Events at Corky's</a>
        </div>
      </div>
      <a routerLink="/shop" routerLinkActive="active">Shop Online</a>
      <a routerLink="/gift-cards" routerLinkActive="active">Gift Cards</a>
      <a routerLink="/tools" routerLinkActive="active">Tools</a>
      <a routerLink="/about" routerLinkActive="active">About Us</a>
      <a routerLink="/contact" routerLinkActive="active">Contact Us</a>
    </nav>
    
    <div class="header-actions">
      <button class="cart-btn" aria-label="Shopping cart">
        <span class="cart-icon">🛒</span>
        <span class="cart-count">0</span>
      </button>
      <button class="menu-toggle" (click)="toggleMenu()" aria-label="Toggle menu">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </div>
</header>
