<footer class="footer">
  <div class="footer-container">
    <div class="footer-content">
      <!-- Contact Section -->
      <div class="footer-section">
        <h3>Contact</h3>
        <p>729 Justus Blvd.<br>Scott Twp, PA 18411</p>
        <p><a href="tel:570-586-9563">570-586-9563</a></p>
      </div>

      <!-- Hours Section -->
      <div class="footer-section">
        <h3>Hours</h3>
        <p>Mon - Sat: 10am – 6pm<br>Sun: 12pm – 5pm</p>
      </div>

      <!-- Newsletter Section -->
      <div class="footer-section newsletter-section">
        <h3>Join Our Newsletter</h3>
        <form class="newsletter-form" (ngSubmit)="onNewsletterSubmit($event)">
          <input 
            type="email" 
            placeholder="Enter your email" 
            class="newsletter-input"
            [(ngModel)]="newsletterEmail"
            name="newsletterEmail"
            required
          >
          <button type="submit" class="btn-newsletter">Subscribe</button>
        </form>
      </div>
    </div>

    <!-- Payment Methods -->
    <div class="payment-methods">
      <h4>Payment methods</h4>
      <div class="payment-icons">
        <span class="payment-icon" title="American Express">American Express</span>
        <span class="payment-icon" title="Apple Pay">Apple Pay</span>
        <span class="payment-icon" title="Diners Club">Diners Club</span>
        <span class="payment-icon" title="Discover">Discover</span>
        <span class="payment-icon" title="JCB">JCB</span>
        <span class="payment-icon" title="Mastercard">Mastercard</span>
        <span class="payment-icon" title="Visa">Visa</span>
      </div>
    </div>

    <!-- Social Media & Copyright -->
    <div class="footer-bottom">
      <div class="social-media">
        <a href="https://facebook.com" target="_blank" rel="noopener noreferrer" aria-label="Facebook">
          Facebook
        </a>
        <a href="https://instagram.com" target="_blank" rel="noopener noreferrer" aria-label="Instagram">
          Instagram
        </a>
      </div>
      <div class="copyright">
        <p>&copy; 2026, Corky's Garden Path</p>
      </div>
    </div>
  </div>
</footer>
